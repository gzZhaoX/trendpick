<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>트렌드픽</title>

  <meta name="theme-color" content="#0f1115" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="트렌드픽" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./styles.css" />

  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
</head>
<body>
  <main style="padding: 20px 0 40px;">
    <section style="padding: 0 14px;">
      <div style="font-size: 14px; color: #9aa3b2; margin-bottom: 10px;">아이폰 홈 화면 웹앱</div>
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px;">
        <div>
          <h1 style="margin:0; font-size:48px; line-height:1.05; font-weight:900;">트렌드픽</h1>
        </div>
        <button id="refreshBtn" class="action-btn" style="white-space:nowrap;">새로고침</button>
      </div>
    </section>

    <section class="trend-item" style="margin-top:18px;">
      <h2 style="margin:0 0 12px; font-size:22px;">지금 뜨는 이슈를 빠르게 확인</h2>
      <p style="margin:0 0 18px; color:#d8deea; line-height:1.55;">
        실시간 뉴스 RSS를 읽어 이슈를 묶어서 보여줘요. 연결이 안 될 때는 마지막 저장 데이터나 샘플 데이터를 보여줘요.
      </p>

      <div style="font-size:14px; color:#9aa3b2; margin-bottom:6px;">업데이트 시간</div>
      <div id="updatedAt" style="font-size:20px; font-weight:800; margin-bottom:16px;">불러오는 중...</div>

      <div style="font-size:14px; color:#9aa3b2; margin-bottom:6px;">데이터 상태</div>
      <div id="sourceState" style="font-size:18px; font-weight:800;">불러오는 중</div>
    </section>

    <section style="padding: 0 14px; margin-top: 20px;">
      <div id="categoryTabs" style="display:flex; gap:8px; overflow:auto; padding-bottom:4px;"></div>
      <div style="margin-top:14px;">
        <input
          id="searchInput"
          type="text"
          placeholder="키워드 검색"
          style="width:100%; background:#171a21; color:#f5f7fb; border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:14px 16px; font-size:16px;"
        />
      </div>
    </section>

    <section style="padding: 0 14px; margin-top: 28px;">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px;">
        <h2 style="margin:0; font-size:22px;">실시간 키워드</h2>
        <button id="showFavoritesBtn" class="action-btn">즐겨찾기</button>
      </div>
    </section>

    <section id="trendList"></section>
  </main>

  <!-- 상세 시트 -->
  <div id="sheetBackdrop" class="hidden" style="
    position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:99;
  "></div>

  <section id="detailSheet" class="hidden" style="
    position:fixed; left:0; right:0; bottom:0;
    background:#171a21; color:#f5f7fb;
    border-top-left-radius:22px; border-top-right-radius:22px;
    padding:18px 16px 24px;
    z-index:100;
    max-height:78vh;
    overflow:auto;
    box-shadow:0 -12px 40px rgba(0,0,0,0.35);
  ">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
      <div>
        <div id="detailRank" style="font-size:13px; color:#9aa3b2; margin-bottom:6px;"></div>
        <div id="detailKeyword" style="font-size:24px; font-weight:900; line-height:1.3;"></div>
      </div>
      <button id="closeDetailBtn" class="action-btn">닫기</button>
    </div>

    <p id="detailSummary" style="margin-top:16px; line-height:1.6; color:#dfe5ef;"></p>

    <div style="display:flex; gap:8px; margin-top:14px;">
      <button id="favoriteBtn" class="action-btn">즐겨찾기</button>
      <button id="shareBtn" class="action-btn">공유</button>
    </div>

    <div id="detailLinks" style="margin-top:18px;"></div>
  </section>

  <!-- 즐겨찾기 시트 -->
  <div id="favoritesBackdrop" class="hidden" style="
    position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:109;
  "></div>

  <section id="favoritesSheet" class="hidden" style="
    position:fixed; left:0; right:0; bottom:0;
    background:#171a21; color:#f5f7fb;
    border-top-left-radius:22px; border-top-right-radius:22px;
    padding:18px 16px 24px;
    z-index:110;
    max-height:70vh;
    overflow:auto;
    box-shadow:0 -12px 40px rgba(0,0,0,0.35);
  ">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
      <div style="font-size:22px; font-weight:900;">즐겨찾기</div>
      <button id="closeFavoritesBtn" class="action-btn">닫기</button>
    </div>

    <div id="favoriteList" style="margin-top:16px;"></div>
  </section>

  <script src="./app.js"></script>
</body>
</html>
